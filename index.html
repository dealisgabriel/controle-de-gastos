<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="flex justify-center direction">
        <div class="border-div flex justify-center direction">
            <h1>Controle de Gastos</h1>
            <form class="flex direction box ">
                <input class="border mt-1" type="number" id="valor" placeholder="Digite o valor do gasto">
                <select class="border mt-1" id="categoria">
                    <option>Alimentação</option>
                    <option>Transporte</option>
                    <option>Lazer</option>
                    <option>Outros</option>
                </select>
                <button onclick="adicionarGasto()" class="border bold mt-1 back-color" type="button">Adicionar</button>
            </form>
            
            <p class="mt-2" id="Alimentação">Alimentação: R$ 0,00</p>
            <p class=" mt-1" id="Transporte">Transporte: R$ 0,00</p> 
            <p class=" mt-1" id="Lazer">Lazer: R$ 0,00</p>
            <p class=" mt-1" id="Outros">Outros: R$ 0,00</p>
            <p class="bold mt-1 back-color" id="Total">Total: R$ 0,00</p>
        </div>
    </main>
</body>
</html>
